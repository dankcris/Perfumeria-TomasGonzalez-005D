server:
  port: 9090

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: clientes-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/clientes/**

        - id: perfumes-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/perfumes/**

        - id: ventas-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/ventas/**

        - id: inventario-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/inventario/**

        - id: proveedores-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/proveedores/**