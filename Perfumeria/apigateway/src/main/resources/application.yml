server:
  port: 9090

# Debe ser EXACTAMENTE la misma clave que la configurada en autenticacionservice
jwt:
  secret: PerfumeriaTomasGonzalez2026ClaveSecretaJWTMinimo32Caracteres

spring:
  application:
    name: api-gateway

  cloud:
    gateway:

      # --- CORS GLOBAL: permite que Swagger UI y el front consuman el gateway ---
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

      routes:

        # 1. AUTENTICACIÓN: pública, sin filtro (login y registro)
        - id: auth-service
          uri: http://localhost:8086
          predicates:
            - Path=/auth/**

        - id: auth-docs
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/autenticacion/v3/api-docs

        # 2. CLIENTES
        - id: clientes-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/clientes/**
          filters:
            - AuthenticationFilter

        - id: clientes-docs
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/clientes/v3/api-docs

        # 3. PERFUMES
        - id: perfumes-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/perfumes/**
          filters:
            - AuthenticationFilter

        - id: perfumes-docs
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/perfumes/v3/api-docs

        # 4. INVENTARIO
        - id: inventario-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/inventario/**
          filters:
            - AuthenticationFilter

        - id: inventario-docs
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/inventario/v3/api-docs

        # 5. PROVEEDORES
        - id: proveedores-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/proveedores/**
          filters:
            - AuthenticationFilter

        - id: proveedores-docs
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/proveedores/v3/api-docs

        # 6. VENTAS
        - id: ventas-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/ventas/**
          filters:
            - AuthenticationFilter

        - id: ventas-docs
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/ventas/v3/api-docs

        # 7. CATEGORIAS
        - id: categorias-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/categorias/**
          filters:
            - AuthenticationFilter

        - id: categorias-docs
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/categorias/v3/api-docs

        # 8. PROMOCIONES
        - id: promociones-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/promociones/**
          filters:
            - AuthenticationFilter

        - id: promociones-docs
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/promociones/v3/api-docs

        # 9. PAGOS
        - id: pagos-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/pagos/**
          filters:
            - AuthenticationFilter

        - id: pagos-docs
          uri: http://localhost:8089
          predicates:
            - Path=/api/v1/pagos/v3/api-docs

        # 10. ENVIOS
        - id: envios-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/envios/**
          filters:
            - AuthenticationFilter

        - id: envios-docs
          uri: http://localhost:8090
          predicates:
            - Path=/api/v1/envios/v3/api-docs

# Swagger UI centralizado: http://localhost:9090/webjars/swagger-ui/index.html
springdoc:
  swagger-ui:
    urls:
      - name: Autenticación
        url: /api/v1/autenticacion/v3/api-docs
      - name: Clientes
        url: /api/v1/clientes/v3/api-docs
      - name: Perfumes
        url: /api/v1/perfumes/v3/api-docs
      - name: Inventario
        url: /api/v1/inventario/v3/api-docs
      - name: Proveedores
        url: /api/v1/proveedores/v3/api-docs
      - name: Ventas
        url: /api/v1/ventas/v3/api-docs
      - name: Categorias
        url: /api/v1/categorias/v3/api-docs
      - name: Promociones
        url: /api/v1/promociones/v3/api-docs
      - name: Pagos
        url: /api/v1/pagos/v3/api-docs
      - name: Envíos
        url: /api/v1/envios/v3/api-docs
